<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Studio AI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <span id="ambient-word">Olá</span>
  </div>
  <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <button id="device-toggle" class="device-toggle" type="button" aria-label="Dispositivos ligados" hidden>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="7" y="2.5" width="10" height="19" rx="2.4"></rect>
      <path d="M10.5 18h3"></path>
    </svg>
  </button>
  <section id="device-panel" class="device-panel" aria-label="Dispositivos ligados">
    <strong>Dispositivos</strong>
    <div id="device-list" class="device-list"></div>
  </section>
  <aside id="menu" class="menu" aria-label="Menu">
    <div class="menu-tabs">
      <button class="menu-tab active" type="button" data-panel="chats">Conversas</button>
      <button class="menu-tab" type="button" data-panel="customize">Personalização</button>
    </div>

    <div class="menu-panel active" id="panel-chats">
      <div class="menu-head">
        <strong>Conversas</strong>
        <div class="menu-head-actions">
          <button id="select-chats" class="icon-action select-icon" type="button" aria-label="Selecionar conversas">
            <span></span>
          </button>
          <button id="new-chat" class="icon-action plus-icon" type="button" aria-label="Nova conversa">
            <span></span>
          </button>
        </div>
      </div>
      <div id="selection-bar" class="selection-bar">
        <span id="selection-count">0 selecionadas</span>
        <button id="delete-selected" class="trash-button" type="button" aria-label="Apagar selecionadas"></button>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
      <div class="menu-actions">
        <button id="clear-chat" class="glass-action" type="button">Limpar atual</button>
      </div>
    </div>

    <div class="menu-panel" id="panel-customize">
      <div class="theme-panel">
        <span>Cores</span>
        <div class="theme-grid">
          <button class="theme-dot active" type="button" data-theme="blue" aria-label="Tema azul"></button>
          <button class="theme-dot" type="button" data-theme="ice" aria-label="Tema gelo"></button>
          <button class="theme-dot" type="button" data-theme="deep" aria-label="Tema profundo"></button>
          <button class="theme-dot" type="button" data-theme="mono" aria-label="Tema preto e branco"></button>
          <button class="theme-dot custom-color" id="custom-color-button" type="button" aria-label="Escolher cor">
            <span>+</span>
          </button>
        </div>
        <div id="custom-palette" class="custom-palette">
          <div class="palette-row">
            <button type="button" data-color="#2f8cff"></button>
            <button type="button" data-color="#00b7ff"></button>
            <button type="button" data-color="#735cff"></button>
            <button type="button" data-color="#00d084"></button>
            <button type="button" data-color="#ff4d8d"></button>
            <button type="button" data-color="#ff3b30"></button>
          </div>
          <label class="palette-slider">
            <span>Tom</span>
            <input id="custom-hue" type="range" min="0" max="360" value="211">
          </label>
          <label class="palette-slider">
            <span>Saturação</span>
            <input id="custom-sat" type="range" min="30" max="100" value="100">
          </label>
          <label class="palette-slider">
            <span>Luz</span>
            <input id="custom-light" type="range" min="28" max="68" value="59">
          </label>
        </div>
      </div>
      <div class="scheme-panel">
        <span>Aparência</span>
        <button id="scheme-toggle" class="scheme-toggle" type="button" aria-label="Alternar claro e escuro">
          <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
          <i></i>
          <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.98 15.37A8 8 0 0 1 8.63 3.02 9 9 0 1 0 20.98 15.37z" />
          </svg>
        </button>
      </div>
      <div class="motion-panel">
        <span>Animação</span>
        <div class="motion-grid">
          <button class="motion-option" type="button" data-motion="halo">Halo</button>
          <button class="motion-option" type="button" data-motion="ribbons">Ribbons</button>
          <button class="motion-option" type="button" data-motion="spotlight">Spotlight</button>
          <button class="motion-option" type="button" data-motion="mesh">Mesh</button>
          <button class="motion-option" type="button" data-motion="azulejos">Azulejos</button>
          <button class="motion-option" type="button" data-motion="sand">Areia</button>
        </div>
      </div>
      <div class="location-panel">
        <span>Localização</span>
        <button id="location-toggle" class="location-toggle" type="button">Usar localização</button>
        <small id="location-status">Portugal guardado</small>
      </div>
    </div>
  </aside>
  <main class="app">
    <section class="chat">
      <div id="starter" class="starter">
        <div class="starter-pills">
          <button class="starter-pill" type="button" data-prompt="Ajuda-me a criar uma página web simples e bonita.">Criar página web</button>
          <button class="starter-pill" type="button" data-prompt="Explica-me este conceito de programação de forma simples.">Explicar código</button>
          <button class="starter-pill" type="button" data-prompt="Dá-me ideias para um projeto pessoal pequeno.">Ideias rápidas</button>
          <button class="starter-pill" type="button" data-prompt="Ajuda-me a organizar uma tarefa passo a passo.">Organizar tarefa</button>
        </div>
      </div>
      <div id="messages" class="messages"></div>

      <div class="model-picker-wrap">
        <button id="model-picker-toggle" class="model-picker-toggle" type="button">
          <i class="model-status" aria-hidden="true"></i>
          <span id="current-model-label">Automático</span>
        </button>
        <div id="model-picker-menu" class="model-picker-menu">
          <button type="button" data-mode="auto">Automático</button>
          <button type="button" data-mode="lite">Studio Lite</button>
          <button type="button" data-mode="vision">Studio Vision</button>
        </div>
      </div>

      <form id="form" class="composer">
        <div class="attach-wrap">
          <button id="attach-toggle" class="attach-toggle" type="button" aria-label="Adicionar">
            <span class="attach-icon"></span>
          </button>
          <div id="attach-menu" class="attach-menu">
            <label aria-label="Adicionar ficheiros">
              <input id="file-input" type="file" multiple accept=".txt,.md,.html,.css,.js,.json,.csv,.ts,.tsx,.jsx,.py,.php,.xml,.yml,.yaml">
              <svg class="attach-option-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <path d="M14 2v6h6" />
                <path d="M8 13h8" />
                <path d="M8 17h5" />
              </svg>
              <strong>Ficheiros</strong>
            </label>
            <label aria-label="Adicionar imagens">
              <input id="image-input" type="file" multiple accept="image/*">
              <svg class="attach-option-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="9" cy="9" r="2" />
                <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21" />
              </svg>
              <strong>Imagens</strong>
            </label>
          </div>
        </div>
        <textarea id="prompt" rows="1" placeholder="Escreve aqui..." autofocus></textarea>
        <button id="send" type="submit" aria-label="Enviar"></button>
      </form>
      <div id="attachments" class="attachments"></div>
    </section>
  </main>
  <div id="image-preview" class="image-preview" aria-hidden="true">
    <button id="image-preview-close" type="button" aria-label="Fechar imagem"></button>
    <img id="image-preview-img" alt="">
  </div>
  <div id="confirm-dialog" class="confirm-dialog" aria-hidden="true">
    <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <h2 id="confirm-title">Confirmar</h2>
      <p id="confirm-message">Tens a certeza?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="confirm-text" type="button">Cancelar</button>
        <button id="confirm-ok" class="confirm-danger" type="button">Apagar</button>
      </div>
    </div>
  </div>
  <div id="voice-player" class="voice-player" aria-hidden="true">
    <button id="voice-prev" type="button" aria-label="Voltar"></button>
    <button id="voice-toggle" type="button" aria-label="Pausar"></button>
    <button id="voice-next" type="button" aria-label="Avancar"></button>
    <div class="voice-track">
      <span id="voice-progress"></span>
    </div>
    <button id="voice-close" type="button" aria-label="Fechar"></button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
